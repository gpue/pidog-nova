<svg width="140" height="140" viewBox="0 0 140 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- background -->
  <rect width="140" height="140" fill="url(#bg)"/>

  <!-- ground shadow -->
  <ellipse cx="70" cy="118" rx="40" ry="8" fill="black" opacity="0.18"/>

  <!-- Pidog: compact quadruped robot dog (SunFounder style) -->
  <g>
    <!-- body (compact, rounded) -->
    <rect x="42" y="58" width="56" height="28" rx="12" fill="url(#fg)"/>
    <!-- top module / electronics housing -->
    <rect x="52" y="50" width="36" height="12" rx="6" fill="white" opacity="0.25"/>
    <!-- body rim -->
    <rect x="45" y="61" width="50" height="20" rx="8" fill="none" stroke="white" stroke-opacity="0.2" stroke-width="2.5"/>

    <!-- neck (short, compact) -->
    <path d="M90 64C98 64 103 61 106 57" stroke="url(#fg2)" stroke-width="8" stroke-linecap="round"/>
    <path d="M90 64C98 64 103 61 106 57" stroke="white" stroke-opacity="0.3" stroke-width="10" stroke-linecap="round"/>

    <!-- head (rounded, friendly) -->
    <ellipse cx="112" cy="48" rx="14" ry="12" fill="url(#fg)"/>
    <!-- face / sensor area -->
    <rect x="104" y="52" width="16" height="8" rx="4" fill="white" opacity="0.35"/>
    <circle cx="108" cy="56" r="2" fill="white" opacity="0.8"/>
    <circle cx="116" cy="56" r="2" fill="white" opacity="0.8"/>

    <!-- legs: elbowed with feet (Pidog style) -->
    <!-- front near -->
    <path d="M58 84 L54 94" stroke="white" stroke-opacity="0.6" stroke-width="7" stroke-linecap="round"/>
    <path d="M54 94 L60 106" stroke="white" stroke-opacity="0.6" stroke-width="7" stroke-linecap="round"/>
    <rect x="56" y="104" width="10" height="5" rx="2.5" fill="white" opacity="0.4"/>

    <!-- front far -->
    <path d="M74 84 L70 95" stroke="white" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round"/>
    <path d="M70 95 L76 106" stroke="white" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round"/>
    <rect x="72" y="104" width="10" height="5" rx="2.5" fill="white" opacity="0.3"/>

    <!-- rear near -->
    <path d="M46 84 L42 94" stroke="white" stroke-opacity="0.6" stroke-width="7" stroke-linecap="round"/>
    <path d="M42 94 L48 106" stroke="white" stroke-opacity="0.6" stroke-width="7" stroke-linecap="round"/>
    <rect x="44" y="104" width="10" height="5" rx="2.5" fill="white" opacity="0.4"/>

    <!-- rear far -->
    <path d="M82 84 L78 95" stroke="white" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round"/>
    <path d="M78 95 L84 106" stroke="white" stroke-opacity="0.45" stroke-width="7" stroke-linecap="round"/>
    <rect x="80" y="104" width="10" height="5" rx="2.5" fill="white" opacity="0.3"/>

    <!-- hip joints -->
    <circle cx="46" cy="84" r="2.8" fill="white" opacity="0.55"/>
    <circle cx="58" cy="84" r="2.8" fill="white" opacity="0.55"/>
    <circle cx="74" cy="84" r="2.8" fill="white" opacity="0.4"/>
    <circle cx="86" cy="84" r="2.8" fill="white" opacity="0.4"/>
  </g>

  <defs>
    <linearGradient id="bg" x1="70" y1="-60" x2="70" y2="160" gradientUnits="userSpaceOnUse">
      <stop stop-color="#6532C7"/>
      <stop offset="1" stop-color="#603B99"/>
    </linearGradient>

    <linearGradient id="fg" x1="42" y1="40" x2="126" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="white"/>
      <stop offset="1" stop-color="#D8F9FD"/>
      <stop offset="1.0001" stop-color="#B8ECFF"/>
    </linearGradient>

    <linearGradient id="fg2" x1="88" y1="68" x2="118" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="white" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#D8F9FD" stop-opacity="0.92"/>
    </linearGradient>
  </defs>
</svg>
